version: '3.8'

services:
  bot:
    build: .
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB_NAME=${MONGO_DB_NAME:-gemini_bot}
      - BOT_TOKEN=${BOT_TOKEN}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_API_MODEL=${GEMINI_API_MODEL:-gemini-3.5-flash}
      - GEMINI_GATEKEEPER_MODEL=${GEMINI_GATEKEEPER_MODEL:-gemini-3.1-flash-lite}
      - GEMINI_BASE_URL=${GEMINI_BASE_URL}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - MCP_SERVERS_CONFIG=${MCP_SERVERS_CONFIG}
      - ADMIN_TELEGRAM_ID=${ADMIN_TELEGRAM_ID:-0}
      - ADMIN_PORT=${ADMIN_PORT:-8081}
    ports:
      - "${ADMIN_PORT:-8081}:${ADMIN_PORT:-8081}"
    depends_on:
      - mongodb
    restart: unless-stopped

  mongodb:
    image: mongo:6.0
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

volumes:
  mongodb_data: